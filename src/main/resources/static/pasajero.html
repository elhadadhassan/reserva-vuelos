<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smiles - Datos del Pasajero</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="gray-bar">
        <div class="container-tabs">
            <div class="tabs">
                <a href="index.html" class="tab">Buscá tu vuelo</a>
                <span class="tab">Registrarse</span>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="tab-content">
            <div class="orange-title-box">
                <h2>Datos del Pasajero</h2>
            </div>
            <div class="form-container">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" id="nombre" placeholder="Ingrese su nombre">
                </div>
                <div class="form-group">
                    <label>Apellido</label>
                    <input type="text" id="apellido" placeholder="Ingrese su apellido">
                </div>
                <div class="form-group">
                    <label>Documento de Identidad</label>
                    <input type="text" id="documento" placeholder="Ingrese su DNI">
                </div>
                <div class="form-group">
                    <label>Correo electrónico</label>
                    <input type="email" id="email" placeholder="ejemplo@mail.com">
                </div>
                <button class="search-btn" id="btnPagar">Pagar</button>
                <button class="search-btn" id="btnVolver" style="background-color: #ccc; margin-top: 10px;">Volver</button>
            </div>
        </div>
    </div>

    <script src="./pasajero.js"></script>
</body>
</html>
