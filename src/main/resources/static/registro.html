<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="gray-bar">
        <div class="container-tabs">
            <div class="tabs">
                <a href="index.html" class="tab">Buscá tu vuelo</a>
                <a href="registro.html" class="tab active">Regístrate</a>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="tab-content">
            <div class="orange-title-box">
                <h2>Registrate</h2>
            </div>
            <div class="form-container">
                <div class="form-group">
                    <label>DNI</label>
                    <input type="text" id="dni" placeholder="Ingrese su DNI">
                </div>
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" id="nombre" placeholder="Ingrese su nombre">
                </div>
                <div class="form-group">
                    <label>Apellido</label>
                    <input type="text" id="apellido" placeholder="Ingrese su apellido">
                </div>
                <div class="form-group">
                    <label>Correo electrónico</label>
                    <input type="email" id="email" placeholder="ejemplo@mail.com">
                </div>
                <div class="form-group">
                    <label>Confirmar correo electrónico</label>
                    <input type="email" id="confirmarEmail" placeholder="ejemplo@mail.com">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" placeholder="Ingrese su contraseña">
                </div>
                <div class="form-group">
                    <label>Confirmar contraseña</label>
                    <input type="password" id="confirmarPassword" placeholder="Confirme su contraseña">
                </div>
                <button class="search-btn" id="btnRegistrarse">Registrarse</button>
                <button class="search-btn" id="btnVolver" style="background-color: #ccc; margin-top: 10px;">Volver</button>
            </div>
        </div>
    </div>

    <script src="./registro.js"></script>
</body>
</html>
